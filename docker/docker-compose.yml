services:
  monbooru:
    container_name: monbooru
    # you can use monbooru:latest-cuda if you have a CUDA compatible GPU for faster auto-tagging
    image: ghcr.io/leqwin/monbooru:latest
    ports:
      - "127.0.0.1:8080:8080"
    # if using CUDA, pass the GPU to the container
    #deploy:
    #  resources:
    #    reservations:
    #      devices:
    #        - driver: nvidia
    #          count: all     
    #          capabilities: [gpu]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETGID
      - SETUID
      - DAC_READ_SEARCH
      - DAC_OVERRIDE
    volumes:
      - /path/to/your/models:/models:ro
      - /path/to/your/gallery:/gallery
      # Additional galleries (need to be mounted in settings)
      # - /path/to/your/gallery2:/gallery2
      # - /path/to/your/gallery3:/gallery3
      - /path/to/monbooru/config:/config
      - /path/to/monbooru/data:/data
    environment:
      - MONBOORU_SERVER_BIND_ADDRESS=0.0.0.0:8080
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --max-time 5 http://localhost:8080/health || exit 1"]
      interval: 30s
      retries: 3
      start_period: 10s
      timeout: 5s
    restart: unless-stopped
